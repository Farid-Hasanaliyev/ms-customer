server:
  port: 8053

spring:
  application:
    name: ms-customer
  datasource:
    url: jdbc:postgresql://localhost:5442/postgres
    username: postgres
    password: "1"
    driver-class-name: org.postgresql.Driver

  jpa:
    properties:
      hibernate:
        default_schema: customer
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true